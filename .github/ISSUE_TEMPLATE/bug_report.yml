name: Bug report
description: Report a reproducible problem in Arc Reactor.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include clear reproduction steps.
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What is broken?
      placeholder: Briefly describe the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps help us reproduce quickly.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: query
    attributes:
      label: Query used (if applicable)
      placeholder: Paste the exact query that triggered the issue.
  - type: textarea
    id: logs
    attributes:
      label: Error logs / console output
      description: Paste stack trace, browser console logs, or API response.
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser + OS + device
      placeholder: Chrome 133 / Windows 11 / Desktop
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
